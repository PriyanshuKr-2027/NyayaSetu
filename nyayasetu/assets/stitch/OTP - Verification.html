<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>NyayaSetu | Verify OTP</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,600;0,700;1,400&amp;family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "secondary": "#4edea3",
                "error-container": "#93000a",
                "inverse-surface": "#e0e2ee",
                "primary": "#ffb693",
                "on-primary-container": "#572000",
                "secondary-fixed-dim": "#4edea3",
                "surface-tint": "#ffb693",
                "on-primary": "#561f00",
                "on-primary-fixed": "#351000",
                "on-error-container": "#ffdad6",
                "tertiary-fixed-dim": "#e4c368",
                "on-secondary-container": "#00311f",
                "primary-container": "#ff6b00",
                "inverse-primary": "#a04100",
                "surface-container-highest": "#31353e",
                "surface-variant": "#31353e",
                "surface-container-lowest": "#0a0e16",
                "on-tertiary-fixed": "#241a00",
                "on-tertiary": "#3d2f00",
                "on-surface": "#e0e2ee",
                "tertiary-container": "#c7a850",
                "surface-container": "#1c2028",
                "on-secondary-fixed": "#002113",
                "tertiary": "#e4c368",
                "background": "#10131c",
                "on-background": "#e0e2ee",
                "inverse-on-surface": "#2d303a",
                "on-tertiary-container": "#4f3d00",
                "error": "#ffb4ab",
                "on-secondary": "#003824",
                "surface-dim": "#10131c",
                "surface-container-high": "#262a33",
                "on-primary-fixed-variant": "#7a3000",
                "on-error": "#690005"
              },
              fontFamily: {
                "headline": ["Newsreader", "serif"],
                "body": ["Inter", "sans-serif"],
                "label": ["Space Grotesk", "sans-serif"],
                "mono": ["JetBrains Mono", "monospace"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1.25rem", "full": "9999px"},
            },
          },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .otp-letter-spacing {
            letter-spacing: 0.75em;
            text-indent: 0.75em;
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body antialiased overflow-hidden">
<!-- Background Content (Blurred Dashboard) -->
<div class="fixed inset-0 z-0 grid grid-cols-12 gap-6 p-8 blur-2xl opacity-40">
<aside class="col-span-2 bg-surface-container-low h-full rounded-2xl"></aside>
<main class="col-span-10 flex flex-col gap-6">
<header class="h-20 bg-surface-container-low rounded-2xl"></header>
<div class="grid grid-cols-3 gap-6 h-48">
<div class="bg-surface-container rounded-2xl"></div>
<div class="bg-surface-container rounded-2xl"></div>
<div class="bg-surface-container rounded-2xl"></div>
</div>
<div class="flex-1 bg-surface-container rounded-2xl"></div>
</main>
</div>
<!-- Overlay: full screen with background #050810 at 80% opacity and backdrop-blur-xl -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-[#050810]/80 backdrop-blur-xl px-4">
<!-- Modal Card: max-width 400px, bg-#0D1117, border 1px solid rgba(255,255,255,0.06), radius-20px, p-32px -->
<div class="w-full max-w-[400px] bg-[#0D1117] border border-white/5 rounded-[20px] p-8 shadow-2xl relative">
<!-- Top-left: back arrow button -->
<button class="absolute top-8 left-8 text-on-surface/40 hover:text-primary transition-colors duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<!-- Content Container -->
<div class="flex flex-col items-center">
<!-- "Check your inbox" Playfair Display 22px bold text-white -->
<h1 class="font-headline font-bold text-[22px] text-on-surface text-center mt-6">Check your inbox</h1>
<!-- Subtext: "We sent a 6-digit code to" -->
<p class="text-on-surface/50 text-[13px] text-center mt-2">
                    We sent a 6-digit code to
                </p>
<!-- Email highlight: "priyanshu@example.com" text-[#FF6B00] 13px font-medium centered mb-8 -->
<p class="text-primary-container text-[13px] font-medium text-center mb-8">
                    priyanshu@example.com
                </p>
<!-- OTP input: bg-#050810 border-rgba(255,255,255,0.06) rounded-12px h-56px -->
<div class="w-full relative group">
<input class="w-full h-14 bg-[#050810] border border-white/5 rounded-xl text-center text-3xl font-mono otp-letter-spacing text-on-surface placeholder:text-on-surface/10 focus:outline-none focus:border-primary-container/40 focus:ring-1 focus:ring-primary-container/20 transition-all duration-300" maxlength="6" placeholder="------" type="text"/>
</div>
<!-- "Verify →" button: bg-saffron/10 border border-saffron/40 text-[#FF6B00] rounded-12px -->
<button class="w-full mt-6 h-11 bg-primary-container/10 border border-primary-container/40 text-primary-container rounded-xl font-body text-sm font-medium hover:bg-primary-container/20 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2">
                    Verify
                    <span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- "Resend in 47s" text-gray-600 text-xs text-center mt-6 -->
<p class="text-on-surface/30 text-xs text-center mt-6 font-label tracking-wide">
                    Resend in <span class="font-mono">47s</span>
</p>
</div>
<!-- Subtle brand anchor at bottom of modal -->
<div class="mt-8 pt-6 border-t border-white/5 flex justify-center">
<span class="font-headline text-sm text-on-surface/20 tracking-widest uppercase">NyayaSetu</span>
</div>
</div>
</div>
<!-- Decorative ambient light blobs -->
<div class="fixed top-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary/5 blur-[120px] rounded-full z-10 pointer-events-none"></div>
<div class="fixed bottom-[-10%] left-[-10%] w-[40%] h-[40%] bg-secondary/5 blur-[120px] rounded-full z-10 pointer-events-none"></div>
</body></html>
